<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição - Arthur Morgan</title>
  <link rel="stylesheet" href="css/inscricao.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-light">

  <header class="bg-black py-3">
    <div class="container d-flex align-items-center justify-content-between">
      <img src="imgs/logoRD2.png" style="height:60px;">
      <h1 class="h4 m-0 text-center flex-fill">Fã Clube do Arthur Morgan</h1>
    </div>
  </header>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-center" id="nav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="historia.html">História</a></li>
          <li class="nav-item"><a class="nav-link active" href="inscricao.html">Inscrição</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">

    <h1 class="text-center mb-4">Junte-se ao Fã Clube</h1>

    <form class="mx-auto" style="max-width: 500px;">

      <div class="form-group">
        <label>Nome</label>
        <input type="text" class="form-control" placeholder="Seu nome">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Seu email">
      </div>

      <div class="form-group">
        <label>Mensagem</label>
        <textarea class="form-control" rows="4" placeholder="Por que você gosta do Arthur Morgan?"></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Enviar</button>

    </form>

  </main>

  <footer class="text-center py-3">
    <p class="m-0">&copy; 2025 Fã Clube do Arthur Morgan</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
