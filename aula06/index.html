<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Login - Projeto Individual</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand font-weight-bold" href="#">NOME DA LOJA</a>

      <div class="mx-auto w-50">
        <input type="text" class="form-control" placeholder="Pesquisa">
      </div>

      <div class="text-white d-flex align-items-center">
        <a href="#" class="btn btn-outline-light mr-2">Registrar-se</a>
        <a href="#" class="btn btn-light">Login</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid main-container">
    <div class="row no-gutters">

      <div class="col-md-7 hero-img d-none d-md-block"></div>


      <div class="col-md-5 d-flex align-items-center justify-content-center">

        <div class="w-75">

          <h2><strong>Olá! 👋</strong></h2>
          <h1 class="mb-4"><strong>Bem-Vindo de volta!</strong></h1>

          <div class="login-box">

            <div class="form-group">
              <label>Usuário:</label>
              <input type="text" class="form-control" placeholder="Insira seu usuário">
            </div>

            <div class="form-group">
              <label>Senha:</label>
              <input type="password" class="form-control" placeholder="Insira sua senha">
            </div>

            <button class="btn btn-dark btn-block">ENTRAR</button>

          </div>

    
          <div class="text-center mt-4">
            <p>Registrar-se com...</p>

            <div class="d-flex justify-content-center">
              <button class="btn btn-light mx-2 social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
              </button>
              <button class="btn btn-light mx-2 social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
              </button>
              <button class="btn btn-light mx-2 social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
              </button>
            </div>

            <p class="mt-3">Já tem uma conta? <strong>Entrar</strong></p>
          </div>

        </div>

      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
